services:
  eventflow.api:
    image: ${DOCKER_REGISTRY-}eventflowapi
    container_name: EventFlow.api
    build:
      context: .
      dockerfile: src/API/EventFlow.Api/Dockerfile
    ports:
      - "5000:8080"
      - "5001:8081"

  eventflow.gateway:
    image: ${DOCKER_REGISTRY-}eventflowgateway
    container_name: EventFlow.Gateway
    build:
      context: .
      dockerfile: src/API/EventFlow.Gateway/Dockerfile
    ports:
      - "3000:8080"
      - "3001:8081"

  eventflow.database:
    image: postgres:17
    container_name: EventFlow.Database
    environment:
      POSTGRES_DB: eventflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./.containers/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  eventflow.seq:
    image: datalust/seq:2024.3 # or latest
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - ./.containers/seq_data:/data
    ports:
      - 8080:80
      - 5341:5341

  eventflow.redis:
    image: redis:latest
    container_name: EventFlow.Redis
    restart: always
    ports:
      - 6379:6379

  eventFlow.identity:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: EventFlow.Identity
    command: start-dev --import-realm
    environment:
      - KC_HEALTH_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./.containers/identity:/opt/keycloak/data
      - ./.files:/opt/keycloak/data/import
    ports:
      - 18080:8080

  eventFlow.jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: EventFlow.Jaeger
    ports:
      - 4317:4317
      - 4318:4318
      - 16686:16686

  eventFlow.queue:
    image: rabbitmq:management-alpine
    container_name: EventFlow.Queue
    hostname: evently-queue
    volumes:
        - ./.containers/queue/data/:/var/lib/rabbitmq
        - ./.containers/queue/log/:/var/log/rabbitmq
    environment:
        RABBITMQ_DEFAULT_USER: guest
        RABBITMQ_DEFAULT_PASS: guest
    ports:
      - 5672:5672
      - 15672:15672